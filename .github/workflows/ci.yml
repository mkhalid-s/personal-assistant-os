name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -W error::ResourceWarning -m unittest discover -s tests

  static-checks:
    name: Static Checks (ruff + mypy + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and static tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install ruff==0.15.20 mypy==2.1.0 pip-audit==2.10.1

      # Fatal: safety-critical modules must stay lint-clean.
      - name: Ruff check (narrow safety-critical scope)
        run: |
          ruff check \
            src/personal_assistant/command_registry.py \
            src/personal_assistant/privacy.py \
            src/personal_assistant/execution.py \
            src/personal_assistant/db.py \
            src/personal_assistant/zero_executor.py

      # Fatal: command_registry is the single source of truth for the CLI
      # command contract; it must stay strict-typed to catch registry drift.
      # privacy.py holds all redaction / retention logic that guards what ever
      # reaches the FTS index, digests, or notifications — a type regression
      # here can silently expose PII, so we promote it to the fatal tier.
      # db.py is the single mutation/schema boundary — 1.7 kloc of connection,
      # migration, and event-append logic; a strict regression here can silently
      # corrupt local state, so it stays in the fatal tier.
      # zero_executor.py is the external coding-executor bridge: it subprocesses
      # `zero exec`, parses schema-versioned stream JSON, and persists agent
      # runs. A strict regression here can silently drop tool events, mis-
      # attribute exit codes, or corrupt the redacted result payload.
      # execution.py is the approve-and-execute safety-critical core: it owns
      # the hard destructive guard, the approval integrity check, the payload
      # hash pinning, the TTL enforcement, and every execution receipt write.
      # A type regression here can silently mis-classify or corrupt approvals.
      - name: Mypy strict (command_registry + privacy + db + zero_executor + execution)
        run: |
          mypy --strict \
            src/personal_assistant/command_registry.py \
            src/personal_assistant/privacy.py \
            src/personal_assistant/db.py \
            src/personal_assistant/zero_executor.py \
            src/personal_assistant/execution.py

      # Fatal: whole-tree lint and format. The safety-critical narrow scope
      # above is redundant now but kept as an explicit belt-and-suspenders
      # so a green run here can never mask a fault in those modules.
      - name: Ruff check (whole tree)
        run: ruff check src/personal_assistant tests

      - name: Ruff format --check (whole tree)
        run: ruff format --check src/personal_assistant tests

      # Advisory: dependency vulnerability scan. Kept non-fatal so upstream
      # advisories can't break unrelated PRs; contributors still see the
      # signal in the CI summary.
      - name: pip-audit (advisory)
        continue-on-error: true
        run: pip-audit --strict --progress-spinner off

  hygiene:
    name: Public Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check diff whitespace
        run: git diff --check HEAD~1..HEAD

      - name: Scan for private references
        run: |
          patterns=("Guide""wire" "GW Bed""rock" "/Users/""mshaikh/Documents/""GW")
          for pattern in "${patterns[@]}"; do
            if git grep -n -F "$pattern" -- ':!*.lock'; then
              echo "Found private reference: $pattern"
              exit 1
            fi
          done

      - name: Scan commit messages for co-author trailers
        run: |
          range="HEAD~1..HEAD"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="origin/${{ github.base_ref }}..HEAD"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          trailer_pattern='^Co-authored-''by:'
          ! git log --format=%B "$range" | grep -i "$trailer_pattern"

      - name: Verify local-only artifacts are not tracked
        run: |
          ! git ls-files | grep -E '(^|/)(\.env|\.DS_Store|\.cursor|\.claude)(/|$)|\.(db|sqlite|sqlite3|log)$'

  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Smoke installed myos command
        run: myos --help >/dev/null

      - name: Build wheel artifact smoke
        run: |
          python -m pip wheel --no-deps . -w dist/wheel-smoke
          python - <<'PY'
          from pathlib import Path
          wheels = sorted(Path("dist/wheel-smoke").glob("*.whl"))
          if not wheels:
              raise SystemExit("wheel build produced no wheel")
          print(f"Built wheel: {wheels[0].name}")
          PY

      - name: Run release readiness gate
        run: myos release-check --strict

  installer-smoke:
    # Prove the one-shot bootstrap works on both supported platforms.
    # Runs the script in dry-run against the just-checked-out source so
    # it does not touch pipx state; then runs `myos install --dry-run`
    # against the editable install already on PATH to prove the
    # post-install verb prints a plan without crashing.
    #
    # A real end-to-end pipx install is deliberately out of scope for
    # per-PR CI (~40 s just to warm pipx cache, dominated by wheel
    # resolution). The path-decoupling landed in P0 already gives us
    # unit-level proof that installed-mode plists resolve correctly;
    # the smoke here catches any shell-syntax or argparse regression.
    name: Installer Smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (editable, so `myos` is on PATH)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify install.sh --help + --dry-run
        run: |
          bash -n scripts/install.sh
          bash scripts/install.sh --help >/dev/null
          bash scripts/install.sh --dry-run --source local:.

      - name: Verify uninstall.sh --help + --dry-run
        run: |
          bash -n scripts/uninstall.sh
          bash scripts/uninstall.sh --help >/dev/null
          bash scripts/uninstall.sh --dry-run

      - name: Verify `myos install --dry-run` prints a plan
        env:
          MYOS_DATA_DIR: ${{ runner.temp }}/myos-smoke
        run: |
          myos install --dry-run
          myos uninstall --dry-run
